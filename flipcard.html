<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Cart</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f0f4f9, #dfe9f3);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      padding: 2rem 2.5rem;
      min-width: 320px;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cart-container h2 {
      color: #333;
      margin-bottom: 1rem;
      font-size: 1.8rem;
    }

    .card-flip {
      width: 320px;
      margin: 30px auto;
      perspective: 700px;
    }

    .card {
      width: 100%;
      height: 370px;
      position: relative;
      transition: all 0.5s;
      transform-style: preserve-3d;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      background: #fff;
      text-align: center;
    }

    .card-flip:hover .card {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      overflow: hidden;
    }

    /* FRONT SIDE */
    .card-front {
      background: #fff;
    }

    .card-front img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .card-front h3 {
      font-size: 1.3rem;
      margin: 1rem 0 0.5rem 0;
      color: #333;
    }

    .card-front p {
      font-size: 1rem;
      color: #666;
      margin-bottom: 1.2rem;
      padding: 0 1rem;
    }

    /* BACK SIDE */
    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;
      padding: 1rem;
      position: relative;
    }

    .card-back::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: rotateGlow 6s linear infinite;
      z-index: 0;
    }

    @keyframes rotateGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .card-back h3 {
      font-size: 1.6rem;
      z-index: 1;
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
      margin-bottom: 1rem;
    }

    .card-back p {
      font-size: 1.2rem;
      z-index: 1;
      font-weight: 500;
    }

    .price-tag {
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      margin-top: 1rem;
      backdrop-filter: blur(5px);
      z-index: 1;
    }

    .buy-btn,
    .offer-btn {
      background: #1abc9c;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      min-width: 110px;
      transition: all 0.3s ease;
      margin: 0.4rem;
    }

    .buy-btn:hover {
      background: #159c85;
      transform: translateY(-6px);
      box-shadow: 0 4px 16px rgba(26,188,156,0.18);
    }

    .offer-btn {
      background: #2f7fca;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .offer-btn:hover {
      background: #f83030;
      transform: translateY(-6px);
      box-shadow: 0 4px 16px rgba(255,180,0,0.18);
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
  </style>
</head>
<body>
  <div class="cart-container">
    <h2>My Cart</h2>
    <div class="card-flip">
      <div class="card">
        <div class="card-front">
          <img src="https://assets.myntassets.com/h_200,w_200,c_fill,g_auto/h_1440,q_100,w_1080/v1/assets/images/24592656/2023/8/22/7d99cf8e-f7dc-40f7-ae43-4165bdda9c891692707533280RedTapeWomenGreyColourblockedSneakers1.jpg" alt="Product">
          <h3>Sneakers</h3>
          <p>Sneakers that move with your Style.</p>
          <button class="offer-btn">OFFER!</button>
          <button class="buy-btn">Buy Now</button>
        </div>
        <div class="card-back">
          <h3>Product Info</h3>
          <p>Stylish & Comfortable Sneakers</p>
          <div class="price-tag">
            <h4>₹999/-</h4>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
